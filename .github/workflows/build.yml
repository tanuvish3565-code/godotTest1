name: Build Godot APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Export Godot APK
        uses: dulvui/godot-android-export@v2
        with:
          godot-version: '4.4'
          working-directory: '.'

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: game-apk
          path: '*.apk'
